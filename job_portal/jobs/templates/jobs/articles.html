{% extends 'jobs/base.html' %}

{% block content %}

<h1>Статті</h1>

{% for article in articles %}

<h3>
    <a href="{% url 'article_detail' article.id %}">
        {{ article.title }}
    </a>
</h3>

<p>{{ article.short_description }}</p>

<p>{{ article.created_at }}</p>

<hr>

{% endfor %}

{% endblock %}
