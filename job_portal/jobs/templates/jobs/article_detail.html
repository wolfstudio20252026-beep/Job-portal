{% extends 'jobs/base.html' %}

{% block content %}

<h1>{{ article.title }}</h1>

<p>{{ article.content }}</p>

<p>{{ article.created_at }}</p>

<a
    href="{% url 'edit_article' article.id %}"
    class="btn"
>
    ✏️ Изменить
</a>

<a
    href="{% url 'delete_article' article.id %}"
    class="btn"
>
    🗑️ Удалить
</a>

{% endblock %}
